<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUKARA · Tablero de Seguimiento del BID</title>
<style>
:root{
 --navy:#0B2E5C; --dnavy:#002B5C; --blue:#0082C3; --slate:#3E6A99; --teal:#00A199;
 --dteal:#00736E; --green:#0F9D6B; --warn:#E0922F; --risk:#D6452B; --pend:#94A3B8;
 --ink:#1F2A37; --sub:#5A6675; --grid:#D6E0EC; --light:#EAF2F8; --bg:#F4F7FB;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",Arial,Helvetica,sans-serif;font-size:13px}
header{background:linear-gradient(90deg,var(--dnavy),var(--navy));color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.3px}
header .sub{font-size:12px;color:#bcd4ec}
header .spacer{flex:1}
header .corte{display:flex;align-items:center;gap:6px;font-size:12px;color:#cfe0f1}
header input[type=date]{border:none;border-radius:6px;padding:4px 6px;font-size:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 20px;background:#fff;border-bottom:1px solid var(--grid)}
button{font-family:inherit;font-size:12px;border:1px solid var(--grid);background:#fff;color:var(--ink);padding:6px 11px;border-radius:7px;cursor:pointer;transition:.15s}
button:hover{border-color:var(--blue);color:var(--blue)}
button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
button.primary:hover{background:#0a6fa6;color:#fff}
button.warn{color:var(--risk)}
button.warn:hover{border-color:var(--risk)}
.wrap{padding:16px 20px;max-width:1500px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#fff;border:1px solid var(--grid);border-top:3px solid var(--blue);border-radius:10px;padding:10px 12px}
.kpi .v{font-size:26px;font-weight:700;line-height:1.1}
.kpi .l{font-size:11px;color:var(--sub);margin-top:2px}
.panels{display:grid;grid-template-columns:1.15fr 1fr 1.25fr;gap:12px;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--grid);border-radius:10px;padding:12px 14px}
.card h3{margin:0 0 10px;font-size:13px;color:var(--navy)}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut{width:120px;height:120px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center}
.donut .hole{width:78px;height:78px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .hole b{font-size:24px;color:var(--navy)}
.donut .hole span{font-size:10px;color:var(--sub)}
.legend{font-size:12px;line-height:1.9}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
.bar-row{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px}
.bar-row .lab{width:74px;color:var(--sub);flex:none;text-align:right}
.bar-row .lab2{width:120px;color:var(--ink);flex:none;font-size:11px}
.track{flex:1;background:var(--light);border-radius:5px;height:16px;overflow:hidden;display:flex}
.seg{height:100%}
.bar-row .num{width:34px;flex:none;font-weight:600;font-size:11px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--grid);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.filters select,.filters input[type=text]{font-family:inherit;font-size:12px;padding:5px 7px;border:1px solid var(--grid);border-radius:7px;background:#fff;color:var(--ink)}
.filters label{font-size:10px;color:var(--sub);display:flex;flex-direction:column;gap:3px}
.tablecard{background:#fff;border:1px solid var(--grid);border-radius:10px;overflow:hidden}
.tbl-scroll{overflow-x:auto}
table{border-collapse:collapse;width:100%;min-width:1100px;font-size:12px}
th{background:var(--dnavy);color:#fff;text-align:left;padding:8px 8px;font-weight:600;position:sticky;top:0;font-size:11px}
td{padding:6px 8px;border-bottom:1px solid #eef3f8;vertical-align:middle}
tr:hover td{background:#f8fbfe}
th.sortable{cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{background:#0a3c73}
th .ar{font-size:9px;margin-left:3px}
.fr-chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;white-space:nowrap}
.fr-dot{width:10px;height:10px;border-radius:3px;flex:none}
.chip{display:inline-block;background:var(--light);color:#0b5c94;border:1px solid #cfe0f1;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:600;margin:1px 2px 1px 0;cursor:help}
.chip.sop{background:#f3f6fa;color:var(--sub);font-weight:500}
.sel-estado{border:none;border-radius:6px;padding:4px 6px;font-size:11px;font-weight:700;color:#fff;cursor:pointer}
.pct{width:54px;border:1px solid var(--grid);border-radius:6px;padding:3px 5px;font-size:12px;text-align:center}
.venc{background:var(--risk);color:#fff;border-radius:5px;padding:1px 6px;font-size:10px;font-weight:700}
.notas{width:140px;border:1px solid transparent;border-radius:6px;padding:3px 5px;font-size:11px;background:transparent}
.notas:focus{border-color:var(--grid);background:#fff;outline:none}
.rowbtn{border:none;background:none;cursor:pointer;color:var(--sub);font-size:13px;padding:2px 5px;border-radius:5px}
.rowbtn:hover{background:var(--light);color:var(--blue)}
.rowbtn.del:hover{color:var(--risk)}
.modal-bg{position:fixed;inset:0;background:rgba(11,28,52,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:30px 14px;overflow:auto}
.modal{background:#fff;border-radius:12px;max-width:680px;width:100%;padding:20px 22px;box-shadow:0 18px 50px rgba(0,0,0,.3)}
.modal h2{margin:0 0 14px;font-size:16px;color:var(--navy)}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.fld input,.fld select{width:100%;font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--grid);border-radius:8px}
.checks{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;max-height:170px;overflow:auto;border:1px solid var(--grid);border-radius:8px;padding:8px}
.checks label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--ink);cursor:pointer}
.checks input{width:auto}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:8px}
.mtable{width:100%;border-collapse:collapse;font-size:12px}
.mtable th{position:static;background:var(--light);color:var(--navy);padding:6px}
.mtable td{padding:4px 5px;border-bottom:1px solid #eef3f8}
.mtable input,.mtable select{width:100%;font-size:11px;padding:4px;border:1px solid var(--grid);border-radius:6px}
.small{font-size:11px;color:var(--sub)}
.flex{display:flex;gap:10px}
.flex>*{flex:1}
.note{font-size:11px;color:var(--sub);margin-top:10px;font-style:italic}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.panels{grid-template-columns:1fr}}
</style>
</head>

<header>

</header>

<div class="wrap">

  <div class="filters" id="filters"></div>
  <div class="tablecard"><div class="tbl-scroll"><table id="tabla"></table></div></div>
  <div class="note" id="footnote"></div>
</div>

function semOf(p){ if(!p) return "Sin fecha"; const d=+p.slice(8,10); return d<=8?"S1":d<=15?"S2":d<=22?"S3":"S4"; }
function estEj(p){ if(!p) return ["Pendiente",0]; const d=+p.slice(8,10); if(d<=9) return ["Hecho",100]; if(d<=16) return ["En curso",50]; return ["Pendiente",0]; }
function toks(s){ return s? s.split("/").map(x=>x.trim()).filter(Boolean):[]; }
function liderToks(n){ const f=frenteBy(n); if(!f) return []; if(f.lider=="Varios"||f.lider.indexOf("sin líder")>=0) return []; return toks(f.lider.replace(/\s/g,"")); }
function frenteBy(n){ return S.frentes.find(f=>f.n==n); }
function persBy(s){ return S.personas.find(p=>p.sigla==s); }
function nombreOf(s){ const p=persBy(s); return p?p.nombre:s; }
function infoOf(s){ const p=persBy(s); return p?(p.nombre+" — "+p.cargo+" · "+p.area):s; }
function involucrados(t){ const set=new Set(); toks(t.resp).forEach(x=>set.add(x)); toks(t.sop).forEach(x=>set.add(x)); liderToks(t.frenteN).forEach(x=>set.add(x)); return set; }
function venc(t){ return t.plazo && t.estado!="Hecho" && t.plazo < corte; }

  return SEED.actividades.map((a,i)=>{

    return {id:"A"+String(i+1).padStart(2,"0"),frenteN:a.frenteN,actividad:a.actividad,
            resp:a.resp,sop:a.sop,plazo:a.plazo||"",estado:est,pct:pct,notas:""};
  });
}

let flt={frente:"",semana:"",estado:"",resp:"",area:"",cargo:"",q:""};

function passes(t){
  if(flt.frente && t.frenteN!=flt.frente) return false;
  if(flt.semana && semOf(t.plazo)!=flt.semana) return false;
  if(flt.estado && t.estado!=flt.estado) return false;
  if(flt.resp){ if(!involucrados(t).has(flt.resp)) return false; }
  if(flt.area){ const ok=[...involucrados(t)].some(s=>{const p=persBy(s);return p&&p.area==flt.area;}); if(!ok) return false; }
  if(flt.cargo){ const ok=[...involucrados(t)].some(s=>{const p=persBy(s);return p&&p.cargo==flt.cargo;}); if(!ok) return false; }
  if(flt.q){ const q=flt.q.toLowerCase(); const hay=(t.actividad+" "+t.resp+" "+t.sop+" "+(frenteBy(t.frenteN)||{}).nombre).toLowerCase(); if(hay.indexOf(q)<0) return false; }
  return true;
}
function shown(){ return S.tasks.filter(passes); }

/* ---------- SORT ---------- */
let sortKey="plazo", sortDir="asc";
const SEMORD={S1:1,S2:2,S3:3,S4:4,"Sin fecha":5};
function sortVal(t,k){
  if(k=="frenteN") return t.frenteN;
  if(k=="actividad") return (t.actividad||"").toLowerCase();
  if(k=="resp") return (t.resp||"").toLowerCase();
  if(k=="semana") return SEMORD[semOf(t.plazo)]||9;
  if(k=="estado"){ const i=ESTORDER.indexOf(t.estado); return i<0?9:i; }
  if(k=="pct") return +t.pct||0;
  return "";
}
function cmp(a,b){
  if(sortKey=="plazo"){ const pa=a.plazo,pb=b.plazo;
    if(!pa&&!pb)return 0; if(!pa)return 1; if(!pb)return -1;   // sin fecha al final
    return sortDir=="asc"?(pa<pb?-1:pa>pb?1:0):(pa<pb?1:pa>pb?-1:0); }
  const va=sortVal(a,sortKey), vb=sortVal(b,sortKey);
  const r = va<vb?-1: va>vb?1:0;
  return sortDir=="asc"? r : -r;
}
function sortBy(k){ if(sortKey==k){ sortDir=(sortDir=="asc"?"desc":"asc"); } else { sortKey=k; sortDir="asc"; } renderTable(); }
function ar(k){ return sortKey==k ? `<span class="ar">${sortDir=="asc"?"▲":"▼"}</span>` : `<span class="ar" style="opacity:.3">↕</span>`; }

function renderKPIs(){
  const t=shown(); const n=t.length;
  const avg=n?Math.round(t.reduce((a,x)=>a+ (+x.pct||0),0)/n):0;
  const cnt=e=>t.filter(x=>x.estado==e).length;
  const vc=t.filter(venc).length;
  const dias=Math.max(0, Math.round((new Date(SEED.cierre)-new Date(corte))/86400000));
  const K=[["Días al cierre",dias,"var(--navy)"],["Actividades",n,"var(--slate)"],
    ["Avance global",avg+"%","var(--teal)"],["Hecho",cnt("Hecho"),"var(--green)"],
    ["En curso",cnt("En curso"),"var(--blue)"],["En riesgo",cnt("En riesgo"),"var(--risk)"],
    ["Vencidas",vc,"var(--warn)"]];
  document.getElementById("kpis").innerHTML=K.map(k=>
    `<div class="kpi" style="border-top-color:${k[2]}"><div class="v" style="color:${k[2]}">${k[1]}</div><div class="l">${k[0]}</div></div>`).join("");
}

function renderCharts(){
  const t=shown(); const n=t.length||1;
  const avg=Math.round(t.reduce((a,x)=>a+(+x.pct||0),0)/(t.length||1));
  // donut
  document.getElementById("cAvance").innerHTML=
    `<div class="donut-wrap"><div class="donut" style="background:conic-gradient(var(--teal) 0 ${avg}%, #E4ECF3 ${avg}% 100%)">
      <div class="hole"><b>${avg}%</b><span>avance</span></div></div>
      <div class="legend">
        <div><i style="background:var(--teal)"></i>Avance ${avg}%</div>
        <div><i style="background:#E4ECF3"></i>Restante ${100-avg}%</div>
        <div class="small" style="margin-top:6px">${t.length} actividad(es) en vista</div>
      </div></div>`;
  // estado bars
  let eh="";
  ESTORDER.forEach(e=>{ const c=t.filter(x=>x.estado==e).length; const w=Math.round(c/n*100);
    eh+=`<div class="bar-row"><div class="lab">${e}</div><div class="track"><div class="seg" style="width:${w}%;background:${ESTC[e]}"></div></div><div class="num">${c}</div></div>`; });
  document.getElementById("cEstado").innerHTML=eh;
  // semana stacked
  const wks=["S1","S2","S3","S4","Sin fecha"]; let sh="";
  wks.forEach(w=>{ const ws=t.filter(x=>semOf(x.plazo)==w); const tot=ws.length;
    let segs=ESTORDER.map(e=>{const c=ws.filter(x=>x.estado==e).length; return c?`<div class="seg" title="${w} · ${e}: ${c}" style="width:${c/(tot||1)*100}%;background:${ESTC[e]}"></div>`:"";}).join("");
    sh+=`<div class="bar-row"><div class="lab">${w}</div><div class="track">${segs}</div><div class="num">${tot}</div></div>`; });
  sh+=`<div class="legend" style="margin-top:8px">`+ESTORDER.map(e=>`<span style="margin-right:12px"><i style="background:${ESTC[e]}"></i>${e}</span>`).join("")+`</div>`;
  document.getElementById("cSemana").innerHTML=sh;
  // area
  let ah="";
  S.frentes.forEach(f=>{ const fr=t.filter(x=>x.frenteN==f.n); if(!fr.length && flt.frente) return;
    const a=fr.length?Math.round(fr.reduce((s,x)=>s+(+x.pct||0),0)/fr.length):0;
    ah+=`<div class="bar-row"><div class="lab2">${f.n}·${f.nombre}</div><div class="track"><div class="seg" style="width:${a}%;background:${f.color}"></div></div><div class="num">${a}%</div></div>`; });
  document.getElementById("cArea").innerHTML=ah;
}

     <td>${x.actividad}</td>
     <td>${chips(x.resp)||'<span class="small">—</span>'}</td>
     <td>${chips(x.sop,'sop')||'<span class="small">—</span>'}</td>
     <td class="small">${f.lider||"—"}</td>
     <td>${x.plazo? x.plazo.slice(8,10)+"/"+x.plazo.slice(5,7):'<span class="small">—</span>'}</td>
     <td class="small">${semOf(x.plazo)}</td>
     <td><select class="sel-estado" style="background:${ESTC[x.estado]}" onchange="setEstado('${x.id}',this.value)">${ESTORDER.map(e=>`<option ${e==x.estado?'selected':''}>${e}</option>`).join("")}</select></td>
     <td><input class="pct" type="number" min="0" max="100" value="${x.pct}" onchange="setPct('${x.id}',this.value)"></td>
     <td>${venc(x)?'<span class="venc">VENCIDA</span>':''}</td>
     <td><input class="notas" value="${(x.notas||'').replace(/"/g,'&quot;')}" placeholder="—" onchange="setNota('${x.id}',this.value)"></td>
     <td style="white-space:nowrap"><button class="rowbtn" title="Editar" onclick="openEdit('${x.id}')">✎</button><button class="rowbtn del" title="Eliminar" onclick="delTask('${x.id}')">✕</button></td>
    </tr>`; });
  h+="</tbody>";
  document.getElementById("tabla").innerHTML=h;
}
function renderFoot(){
  document.getElementById("footnote").textContent=
   "Estado y % de avance son de EJEMPLO y editables. Haz clic en los encabezados (Plazo, Estado, % Av., Frente…) para ordenar ascendente/descendente. Edita responsables/soporte con ✎, agrega o elimina actividades y workstreams, y administra personas (siglas, cargo, área). Los cambios se guardan automáticamente. Filtra por persona/área/cargo para hacer seguimiento.";
}

/* ---------- EDITS ---------- */
function setEstado(id,v){ const t=S.tasks.find(x=>x.id==id); t.estado=v; if(v=="Hecho")t.pct=100; render(); }
function setPct(id,v){ const t=S.tasks.find(x=>x.id==id); t.pct=Math.max(0,Math.min(100,+v||0)); render(); }
function setNota(id,v){ S.tasks.find(x=>x.id==id).notas=v; save(); }
function delTask(id){ const t=S.tasks.find(x=>x.id==id); if(confirm("¿Eliminar la actividad «"+t.actividad+"»?")){ S.tasks=S.tasks.filter(x=>x.id!=id); render(); } }

const MB=document.getElementById("modalBg"), MX=document.getElementById("modalBox");
function closeModal(){ MB.style.display="none"; }
MB.addEventListener("click",e=>{ if(e.target===MB) closeModal(); });

function personCheckboxes(name,selected){
  const sel=new Set(toks(selected));
  return S.personas.map(p=>`<label><input type="checkbox" name="${name}" value="${p.sigla}" ${sel.has(p.sigla)?'checked':''}> ${p.sigla} <span class="small">${p.nombre.split(' ')[0]}</span></label>`).join("");
}
function getChecks(name){ return [...MX.querySelectorAll(`input[name="${name}"]:checked`)].map(c=>c.value).join("/"); }

function openEdit(id){
  const t=id?S.tasks.find(x=>x.id==id):null;
  MX.innerHTML=`<h2>${id?'Editar actividad':'Nueva actividad'}</h2>
   <div class="fld"><label>Frente (workstream)</label><select id="eFr">${S.frentes.map(f=>`<option value="${f.n}" ${t&&t.frenteN==f.n?'selected':''}>${f.n}·${f.nombre}</option>`).join("")}</select></div>
   <div class="fld"><label>Actividad</label><input id="eAct" value="${t?t.actividad.replace(/"/g,'&quot;'):''}"></div>
   <div class="flex">
     <div class="fld"><label>Plazo</label><input type="date" id="ePz" value="${t?t.plazo:''}"></div>
     <div class="fld"><label>Estado</label><select id="eEst">${ESTORDER.map(e=>`<option ${t&&t.estado==e?'selected':''}>${e}</option>`).join("")}</select></div>
     <div class="fld"><label>% Avance</label><input type="number" id="ePct" min="0" max="100" value="${t?t.pct:0}"></div>
   </div>
   <div class="fld"><label>Responsable(s) — siglas</label><div class="checks">${personCheckboxes('eResp',t?t.resp:'')}</div></div>
   <div class="fld"><label>Soporte / apoyo — siglas</label><div class="checks">${personCheckboxes('eSop',t?t.sop:'')}</div></div>
   <div class="modal-actions"><button onclick="closeModal()">Cancelar</button><button class="primary" onclick="saveEdit('${id||''}')">Guardar</button></div>`;
  MB.style.display="flex";
}
function saveEdit(id){
  const fr=+document.getElementById("eFr").value;
  const act=document.getElementById("eAct").value.trim(); if(!act){alert("Escribe la actividad");return;}
  const pz=document.getElementById("ePz").value;
  const est=document.getElementById("eEst").value;
  const pct=Math.max(0,Math.min(100,+document.getElementById("ePct").value||0));
  const resp=getChecks("eResp"), sop=getChecks("eSop");
  if(id){ const t=S.tasks.find(x=>x.id==id); Object.assign(t,{frenteN:fr,actividad:act,plazo:pz,estado:est,pct:pct,resp:resp,sop:sop}); }
  else{ const mx=Math.max(0,...S.tasks.map(x=>+x.id.slice(1))); S.tasks.push({id:"A"+String(mx+1).padStart(2,"0"),frenteN:fr,actividad:act,plazo:pz,estado:est,pct:pct,resp:resp,sop:sop,notas:""}); }
  closeModal(); render();
}

/* ---------- WORKSTREAMS ---------- */
function openWS(){
  MX.innerHTML=`<h2>Workstreams (frentes)</h2>
   <table class="mtable"><thead><tr><th>#</th><th>Nombre</th><th>Líder</th><th>Color</th><th>Act.</th><th></th></tr></thead><tbody>
   ${S.frentes.map(f=>{const c=S.tasks.filter(t=>t.frenteN==f.n).length; return `<tr>
     <td style="width:38px"><input value="${f.n}" onchange="wsField(${f.n},'n',this.value)"></td>
     <td><input value="${f.nombre.replace(/"/g,'&quot;')}" onchange="wsField(${f.n},'nombre',this.value)"></td>
     <td><input value="${f.lider.replace(/"/g,'&quot;')}" onchange="wsField(${f.n},'lider',this.value)"></td>
     <td style="width:48px"><input type="color" value="${f.color}" onchange="wsField(${f.n},'color',this.value)" style="padding:0;height:28px"></td>
     <td class="small" style="text-align:center">${c}</td>
     <td><button class="rowbtn del" title="Eliminar" onclick="wsDel(${f.n})">✕</button></td></tr>`;}).join("")}
   </tbody></table>
   <div class="fld" style="margin-top:14px"><label>Agregar workstream — nombre</label>
     <div class="flex"><input id="wsNom" placeholder="Nombre del frente">
       <input id="wsLid" placeholder="Líder (siglas o nombre)"><input type="color" id="wsCol" value="#0082C3" style="flex:0 0 48px;padding:0;height:36px"></div></div>
   <div class="modal-actions"><button onclick="closeModal()">Cerrar</button><button class="primary" onclick="wsAdd()">Agregar workstream</button></div>
   <div class="note">Eliminar un workstream borra también sus actividades. El líder puede ser una o varias siglas (p. ej. «C.I. / E.C.») o «— (sin líder)».</div>`;
  MB.style.display="flex";
}
function wsField(n,k,v){ const f=frenteBy(n); if(k=='n'){ const nn=+v; if(nn&&nn!=n&&!frenteBy(nn)){ S.tasks.forEach(t=>{if(t.frenteN==n)t.frenteN=nn}); f.n=nn; } } else f[k]=v; render(); openWS(); }
function wsDel(n){ const c=S.tasks.filter(t=>t.frenteN==n).length; if(confirm("¿Eliminar el workstream y sus "+c+" actividad(es)?")){ S.frentes=S.frentes.filter(f=>f.n!=n); S.tasks=S.tasks.filter(t=>t.frenteN!=n); render(); openWS(); } }
function wsAdd(){ const nom=document.getElementById("wsNom").value.trim(); if(!nom){alert("Escribe el nombre");return;}
  const lid=document.getElementById("wsLid").value.trim()||"— (sin líder)"; const col=document.getElementById("wsCol").value;
  const mx=Math.max(0,...S.frentes.map(f=>+f.n)); S.frentes.push({n:mx+1,nombre:nom,lider:lid,color:col}); render(); openWS(); }

/* ---------- PERSONAS ---------- */
function openPers(){
  MX.innerHTML=`<h2>Personas (siglas · cargo · área)</h2>
   <div style="max-height:340px;overflow:auto"><table class="mtable"><thead><tr><th>Sigla</th><th>Nombre</th><th>Cargo</th><th>Área</th><th></th></tr></thead><tbody>
   ${S.personas.map((p,i)=>`<tr>
     <td style="width:60px"><input value="${p.sigla}" onchange="pField(${i},'sigla',this.value)"></td>
     <td><input value="${p.nombre.replace(/"/g,'&quot;')}" onchange="pField(${i},'nombre',this.value)"></td>
     <td><input value="${p.cargo.replace(/"/g,'&quot;')}" onchange="pField(${i},'cargo',this.value)"></td>
     <td><input value="${p.area.replace(/"/g,'&quot;')}" onchange="pField(${i},'area',this.value)"></td>
     <td><button class="rowbtn del" onclick="pDel(${i})">✕</button></td></tr>`).join("")}
   </tbody></table></div>
   <div class="fld" style="margin-top:12px"><label>Agregar persona</label>
     <div class="flex"><input id="pSig" placeholder="Sigla (A.B.)"><input id="pNom" placeholder="Nombre"></div>
     <div class="flex" style="margin-top:6px"><input id="pCar" placeholder="Cargo"><input id="pAre" placeholder="Área"></div></div>
   <div class="modal-actions"><button onclick="closeModal()">Cerrar</button><button class="primary" onclick="pAdd()">Agregar persona</button></div>
   <div class="note">Las siglas/cargos/áreas alimentan los chips, los tooltips y los filtros por persona/área/cargo.</div>`;
  MB.style.display="flex";
}
function pField(i,k,v){ S.personas[i][k]=v; save(); if(k=='area'||k=='cargo'||k=='sigla') renderFilters(); renderTable(); }
function pDel(i){ if(confirm("¿Eliminar a "+S.personas[i].nombre+"? (no borra actividades)")){ S.personas.splice(i,1); render(); openPers(); } }
function pAdd(){ const s=document.getElementById("pSig").value.trim(); const n=document.getElementById("pNom").value.trim();
  if(!s){alert("Escribe la sigla");return;} if(persBy(s)){alert("Esa sigla ya existe");return;}
  S.personas.push({sigla:s,nombre:n||s,cargo:document.getElementById("pCar").value.trim()||"Por confirmar",area:document.getElementById("pAre").value.trim()||"Por confirmar",unidad:""});
  render(); openPers(); }

/* ---------- IMPORT / EXPORT ---------- */
function dl(name,txt,type){ const b=new Blob([txt],{type:type}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function exportJSON(){ dl("PUKARA_seguimiento.json",JSON.stringify({S,corte},null,2),"application/json"); }
function importJSON(ev){ const f=ev.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ const o=JSON.parse(r.result); if(o.S){S=o.S; if(o.corte)corte=o.corte;} else S=o; document.getElementById("corte").value=corte; render(); }catch(e){alert("Archivo inválido");} }; r.readAsText(f); }
function exportCSV(){
  const head=["ID","FrenteN","Frente","Actividad","Responsable","Soporte","Lider","Plazo","Semana","Estado","PctAvance","Vencida","Notas"];
  const rows=S.tasks.map(t=>{const f=frenteBy(t.frenteN)||{};return [t.id,t.frenteN,f.nombre||"",t.actividad,t.resp,t.sop,f.lider||"",t.plazo,semOf(t.plazo),t.estado,t.pct,venc(t)?"Sí":"No",(t.notas||"")].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(",");});
  dl("PUKARA_seguimiento.csv","\ufeff"+[head.join(","),...rows].join("\n"),"text/csv");
}
function restore(){ if(confirm("¿Restaurar el plan original? Se perderán los cambios guardados.")){ S=freshState(); corte=SEED.corte; document.getElementById("corte").value=corte; render(); } }

/* ---------- BOOT ---------- */
(async function(){
  document.getElementById("cierreLbl").textContent=SEED.cierre.slice(8,10)+"/"+SEED.cierre.slice(5,7)+"/"+SEED.cierre.slice(0,4);
  const saved=await load();
  if(saved&&saved.S){ S=saved.S; corte=saved.corte||SEED.corte; } else { S=freshState(); }
  // safety: ensure arrays exist
  if(!S.personas||!S.frentes||!S.tasks){ S=freshState(); }
  const ci=document.getElementById("corte"); ci.value=corte; ci.min="2026-06-01"; ci.max="2026-06-30";
  ci.onchange=e=>{ corte=e.target.value||SEED.corte; render(); };
  render();
})();
</script>
